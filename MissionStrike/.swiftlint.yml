# SwiftLint configuration for MissionStrike
# Enforces consistency across AI-generated and hand-written code.

excluded:
  - .build
  - Package.swift

# --- Rule configuration ---

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

# CFTypeRef → AXUIElement casts are safe and documented (see code review #2).
force_cast:
  severity: warning

# Trailing commas are a valid style choice in Swift.
trailing_comma:
  mandatory_comma: false

# Short-lived variable names (e.g., `t` for title) are acceptable in tight scopes.
identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60

# The CGWindow lookup returns a 3-member tuple; this is fine.
large_tuple:
  warning: 3
  error: 4

# attemptToClose is inherently complex due to the AX fallback chain.
cyclomatic_complexity:
  warning: 15
  error: 25

function_body_length:
  warning: 70
  error: 100

# --- Opt-in rules ---
opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - fatal_error_message
  - first_where
  - implicitly_unwrapped_optional
  - modifier_order
  - overridden_super_call
  - private_outlet
  - redundant_nil_coalescing
  - sorted_first_last
  - vertical_whitespace_closing_braces

